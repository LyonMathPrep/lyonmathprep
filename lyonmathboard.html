<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>MathBoard — Digital Whiteboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.25/dist/katex.min.css" crossorigin="anonymous" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Fredoka:wght@400;500;600;700&family=Caveat:wght@400;500;600;700&family=Comic+Neue:wght@400;700&family=Architects+Daughter&family=Patrick+Hand&family=Indie+Flower&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#fff;--surface:#f8f9fa;--surface2:#e9ecef;--border:#dee2e6;--accent:#4263eb;--accent-hover:#364fc7;--text:#212529;--text-muted:#6c757d;--danger:#fa5252;--shadow:0 2px 8px rgba(0,0,0,.08);--shadow-lg:0 4px 16px rgba(0,0,0,.12)}
    html,body{width:100%;height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);-webkit-user-select:none;user-select:none}
    #viewport{position:fixed;inset:0;overflow:hidden}
    #main-canvas{position:absolute;top:0;left:0;touch-action:none;display:block}
    #eraser-cursor{position:fixed;pointer-events:none;border-radius:50%;border:2px dashed var(--accent);background:rgba(66,99,235,.08);display:none;z-index:50;transform:translate(-50%,-50%)}
    #selection-box{position:fixed;border:2px dashed var(--accent);background:rgba(66,99,235,.08);pointer-events:none;display:none;z-index:20;border-radius:2px}
    #sel-toolbar{position:fixed;z-index:250;display:none;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:6px 8px;box-shadow:var(--shadow-lg);gap:3px;align-items:center;flex-wrap:wrap;max-width:520px;justify-content:center}
    #sel-toolbar.visible{display:flex}
    .sel-act{width:30px;height:30px;border:1px solid transparent;background:transparent;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:all .15s;position:relative;flex-shrink:0}
    .sel-act svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .sel-act:hover{background:var(--surface2);color:var(--text);border-color:var(--border)}
    .sel-act.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    .sel-act.danger:hover{background:rgba(250,82,82,.1);color:var(--danger);border-color:rgba(250,82,82,.3)}
    .sel-act::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--text);color:#fff;font-size:10px;font-weight:500;white-space:nowrap;padding:3px 7px;border-radius:4px;opacity:0;pointer-events:none;transition:opacity .15s;z-index:300}
    .sel-act:hover::after{opacity:1}
    .sel-divider{width:1px;height:20px;background:var(--border);flex-shrink:0}
    .sel-rotate-box{display:flex;align-items:center;gap:1px;background:#fff;border:1px solid var(--border);border-radius:6px;padding:2px 5px;flex-shrink:0}
    .sel-rotate-box input{width:38px;border:none;outline:none;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;color:var(--text);text-align:center;background:transparent;-moz-appearance:textfield}
    .sel-rotate-box input::-webkit-outer-spin-button,.sel-rotate-box input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
    .sel-rotate-box span{font-size:11px;color:var(--text-muted);font-weight:600}
    #toolbar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:200;display:flex;align-items:center;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:8px 10px;box-shadow:var(--shadow-lg)}
    .tool-btn{position:relative;width:38px;height:38px;border-radius:8px;border:1px solid transparent;background:transparent;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;outline:none;flex-shrink:0}
    .tool-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .tool-btn:hover{background:var(--surface2);border-color:var(--border)}
    .tool-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    .tool-btn.danger:hover{background:rgba(250,82,82,.1);color:var(--danger);border-color:var(--danger)}
    .tool-divider{width:1px;height:28px;background:var(--border);flex-shrink:0}
    .tool-btn::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--text);color:#fff;font-size:11px;font-weight:500;white-space:nowrap;padding:4px 8px;border-radius:4px;opacity:0;pointer-events:none;transition:opacity .15s;z-index:300}
    .tool-btn:hover::after{opacity:1}
    #props{position:fixed;right:20px;top:50%;transform:translateY(-50%);z-index:200;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;box-shadow:var(--shadow-lg);display:flex;flex-direction:column;gap:12px;min-width:210px;max-height:85vh;overflow-y:auto}
    .prop-section{display:flex;flex-direction:column;gap:6px}.prop-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted)}.prop-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.prop-divider{height:1px;background:var(--border)}
    .color-swatch{width:26px;height:26px;border-radius:6px;border:2px solid transparent;cursor:pointer;transition:all .15s}.color-swatch:hover{transform:scale(1.1)}.color-swatch.selected{border-color:var(--accent);box-shadow:0 0 0 2px rgba(66,99,235,.2)}
    .prop-slider{-webkit-appearance:none;appearance:none;flex:1;height:4px;border-radius:2px;background:var(--surface2);outline:none;cursor:pointer}.prop-slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2)}.prop-value{font-size:13px;font-weight:600;color:var(--text);min-width:32px;text-align:right}
    .line-style-btn{flex:1;padding:6px;border-radius:6px;border:1px solid var(--border);background:#fff;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}.line-style-btn svg{width:32px;height:16px;stroke:var(--text);fill:none;stroke-width:2;stroke-linecap:round}.line-style-btn:hover{background:var(--surface)}.line-style-btn.active{background:var(--accent);border-color:var(--accent)}.line-style-btn.active svg{stroke:#fff}
    .prop-select{background:#fff;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:7px 10px;font-family:'Inter',sans-serif;font-size:13px;width:100%;cursor:pointer;outline:none}.prop-select:focus{border-color:var(--accent)}
    .grid-toggle-row{display:flex;gap:6px}.grid-btn{flex:1;padding:6px 4px;border-radius:6px;border:1px solid var(--border);background:#fff;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;font-size:11px;font-weight:500;color:var(--text-muted);text-align:center}.grid-btn:hover{background:var(--surface)}.grid-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
    #text-overlay{position:fixed;display:none;z-index:400;background:#fff;border:2px solid var(--accent);border-radius:12px;box-shadow:var(--shadow-lg);padding:16px;min-width:340px;max-width:500px}#text-overlay.open{display:block;animation:popIn .2s cubic-bezier(.34,1.56,.64,1)}@keyframes popIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
    .text-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.text-title{font-size:14px;font-weight:600}.text-close{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:20px;line-height:1;padding:0;width:24px;height:24px;display:flex;align-items:center;justify-content:center}.text-close:hover{color:var(--danger)}
    .mode-tabs{display:flex;gap:4px;margin-bottom:12px}.mode-tab{flex:1;padding:6px 0;border-radius:6px;border:1px solid var(--border);background:#fff;color:var(--text-muted);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;text-align:center}.mode-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    #tex-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;padding:10px 12px;outline:none;resize:none;min-height:80px;line-height:1.5}#tex-input:focus{border-color:var(--accent)}
    #tex-preview{background:var(--surface);border-radius:8px;padding:10px 12px;min-height:48px;margin:10px 0;font-size:16px;overflow-x:auto;display:flex;align-items:center;border:1px solid var(--border)}
    .text-buttons{display:flex;justify-content:flex-end;gap:8px;margin-top:8px}.text-btn{padding:8px 16px;border-radius:6px;border:none;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}.text-btn.primary{background:var(--accent);color:#fff}.text-btn.primary:hover{background:var(--accent-hover)}.text-btn.secondary{background:var(--surface2);color:var(--text)}.text-btn.secondary:hover{background:var(--border)}
    #zoom-bar{position:fixed;top:20px;right:20px;z-index:200;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 12px;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--text);box-shadow:var(--shadow)}.zoom-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:18px;line-height:1;font-family:'Inter',sans-serif;padding:0 2px;width:24px;height:24px;display:flex;align-items:center;justify-content:center}.zoom-btn:hover{color:var(--accent)}
    #coord-display{position:fixed;bottom:20px;left:20px;z-index:200;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-muted);box-shadow:var(--shadow);pointer-events:none}
    #toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(80px);z-index:1000;background:var(--text);color:#fff;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:500;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s}#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
    body.cur-pen{cursor:crosshair}body.cur-marker{cursor:crosshair}body.cur-eraser{cursor:none}body.cur-text{cursor:text}body.cur-select{cursor:default}body.cur-pan{cursor:grab}body.cur-panning{cursor:grabbing}body.cur-line,body.cur-rect,body.cur-ellipse,body.cur-arrow,body.cur-triangle{cursor:crosshair}body.cur-moving{cursor:move}body.cur-nw-resize{cursor:nw-resize}body.cur-ne-resize{cursor:ne-resize}body.cur-sw-resize{cursor:sw-resize}body.cur-se-resize{cursor:se-resize}body.cur-n-resize{cursor:n-resize}body.cur-s-resize{cursor:s-resize}body.cur-e-resize{cursor:e-resize}body.cur-w-resize{cursor:w-resize}body.cur-rotate{cursor:crosshair}body.cur-point{cursor:move}
    /* Selection editing indicator */
    .prop-section.editing-hint{background:rgba(66,99,235,.06);border-radius:8px;padding:8px;border:1px solid rgba(66,99,235,.15)}
    .prop-section.editing-hint .prop-label{color:var(--accent)}
    /* Flip animation overlay */
    #flip-overlay{position:fixed;inset:0;pointer-events:none;z-index:30}
  </style>
</head>
<body class="cur-pen">
<div id="viewport"><canvas id="main-canvas"></canvas><div id="eraser-cursor"></div><div id="selection-box"></div><canvas id="flip-overlay"></canvas></div>
<div id="sel-toolbar">
  <button class="sel-act" id="btn-edit-points" data-tip="Edit Points" onclick="MB.togglePointEdit()"><svg viewBox="0 0 24 24"><circle cx="6" cy="6" r="2"/><circle cx="18" cy="6" r="2"/><circle cx="6" cy="18" r="2"/><circle cx="18" cy="18" r="2"/><path d="M6 6L18 18M18 6L6 18" stroke-dasharray="2,2"/></svg></button>
  <div class="sel-rotate-box"><input type="number" id="rot-input" value="0" min="-360" max="360" step="1" onchange="MB.setRotation(+this.value)" onkeydown="if(event.key==='Enter')this.blur()" onclick="this.select()"><span>°</span></div>
  <div class="sel-divider"></div>
  <button class="sel-act" data-tip="Flip Horizontal" onclick="MB.flipH()"><svg viewBox="0 0 24 24"><path d="M12 3v18M8 7L4 12l4 5M16 7l4 5-4 5"/></svg></button>
  <button class="sel-act" data-tip="Flip Vertical" onclick="MB.flipV()"><svg viewBox="0 0 24 24"><path d="M3 12h18M7 8l5-4 5 4M7 16l5 4 5-4"/></svg></button>
  <div class="sel-divider"></div>
  <button class="sel-act" data-tip="Align Left" onclick="MB.align('left')"><svg viewBox="0 0 24 24"><path d="M4 3v18"/><rect x="7" y="5" width="12" height="5"/><rect x="7" y="14" width="8" height="5"/></svg></button>
  <button class="sel-act" data-tip="Align Center H" onclick="MB.align('hcenter')"><svg viewBox="0 0 24 24"><path d="M12 3v18"/><rect x="6" y="5" width="12" height="5"/><rect x="8" y="14" width="8" height="5"/></svg></button>
  <button class="sel-act" data-tip="Align Right" onclick="MB.align('right')"><svg viewBox="0 0 24 24"><path d="M20 3v18"/><rect x="5" y="5" width="12" height="5"/><rect x="9" y="14" width="8" height="5"/></svg></button>
  <button class="sel-act" data-tip="Align Top" onclick="MB.align('top')"><svg viewBox="0 0 24 24"><path d="M3 4h18"/><rect x="5" y="7" width="5" height="12"/><rect x="14" y="7" width="5" height="8"/></svg></button>
  <button class="sel-act" data-tip="Align Middle V" onclick="MB.align('vcenter')"><svg viewBox="0 0 24 24"><path d="M3 12h18"/><rect x="5" y="6" width="5" height="12"/><rect x="14" y="8" width="5" height="8"/></svg></button>
  <button class="sel-act" data-tip="Align Bottom" onclick="MB.align('bottom')"><svg viewBox="0 0 24 24"><path d="M3 20h18"/><rect x="5" y="5" width="5" height="12"/><rect x="14" y="9" width="5" height="8"/></svg></button>
  <div class="sel-divider"></div>
  <button class="sel-act" data-tip="Duplicate (Ctrl+D)" onclick="MB.duplicateSel()"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
  <button class="sel-act" data-tip="Bring Forward" onclick="MB.bringForward()"><svg viewBox="0 0 24 24"><polyline points="17 11 12 6 7 11"/><line x1="12" y1="6" x2="12" y2="18"/></svg></button>
  <button class="sel-act" data-tip="Send Backward" onclick="MB.sendBackward()"><svg viewBox="0 0 24 24"><polyline points="7 13 12 18 17 13"/><line x1="12" y1="18" x2="12" y2="6"/></svg></button>
  <div class="sel-divider"></div>
  <button class="sel-act danger" data-tip="Delete (Del)" onclick="MB.deleteSelected()"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg></button>
</div>
<div id="toolbar">
  <button class="tool-btn active" id="btn-pen" data-tip="Pen (P)" onclick="MB.tool('pen')"><svg viewBox="0 0 24 24"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg></button>
  <button class="tool-btn" id="btn-marker" data-tip="Marker (M)" onclick="MB.tool('marker')"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/><path d="m15 5 3 3"/></svg></button>
  <button class="tool-btn" id="btn-eraser" data-tip="Eraser (E)" onclick="MB.tool('eraser')"><svg viewBox="0 0 24 24"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg></button>
  <div class="tool-divider"></div>
  <button class="tool-btn" id="btn-line" data-tip="Line (L)" onclick="MB.tool('line')"><svg viewBox="0 0 24 24"><line x1="5" y1="19" x2="19" y2="5"/></svg></button>
  <button class="tool-btn" id="btn-arrow" data-tip="Arrow (A)" onclick="MB.tool('arrow')"><svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="13 6 19 12 13 18"/></svg></button>
  <button class="tool-btn" id="btn-rect" data-tip="Rectangle (R)" onclick="MB.tool('rect')"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg></button>
  <button class="tool-btn" id="btn-triangle" data-tip="Triangle (G)" onclick="MB.tool('triangle')"><svg viewBox="0 0 24 24"><polygon points="12,3 2,21 22,21" fill="none"/></svg></button>
  <button class="tool-btn" id="btn-ellipse" data-tip="Ellipse (O)" onclick="MB.tool('ellipse')"><svg viewBox="0 0 24 24"><ellipse cx="12" cy="12" rx="10" ry="8"/></svg></button>
  <div class="tool-divider"></div>
  <button class="tool-btn" id="btn-text" data-tip="Text / LaTeX (T)" onclick="MB.tool('text')"><svg viewBox="0 0 24 24"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg></button>
  <button class="tool-btn" id="btn-select" data-tip="Select (S)" onclick="MB.tool('select')"><svg viewBox="0 0 24 24"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/><path d="M13 13l6 6"/></svg></button>
  <button class="tool-btn" id="btn-pan" data-tip="Pan (Space)" onclick="MB.tool('pan')"><svg viewBox="0 0 24 24"><path d="M18 11V6a2 2 0 0 0-4 0v5"/><path d="M14 10V4a2 2 0 0 0-4 0v6"/><path d="M10 10.5V6a2 2 0 0 0-4 0v8"/><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8H12a8 8 0 0 1-8-8V8"/></svg></button>
  <div class="tool-divider"></div>
  <button class="tool-btn" data-tip="Undo (Ctrl+Z)" onclick="MB.undo()"><svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg></button>
  <button class="tool-btn" data-tip="Redo (Ctrl+Y)" onclick="MB.redo()"><svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.13-9.36L23 10"/></svg></button>
  <div class="tool-divider"></div>
  <button class="tool-btn" data-tip="Export PNG" onclick="MB.exportPNG()"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
  <button class="tool-btn danger" data-tip="Clear All" onclick="MB.clearAll()"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
</div>
<div id="props">
  <div class="prop-section" id="sel-info-section" style="display:none">
    <div class="prop-label" style="color:var(--accent);font-size:12px">✎ Editing Selection</div>
    <div style="font-size:11px;color:var(--text-muted);margin-top:2px" id="sel-info-text">1 object selected</div>
  </div>
  <div class="prop-divider" id="sel-info-divider" style="display:none"></div>
  <div class="prop-section"><div class="prop-label">Color</div><div class="prop-row" id="color-row"><div class="color-swatch selected" style="background:#212529" data-c="#212529"></div><div class="color-swatch" style="background:#4263eb" data-c="#4263eb"></div><div class="color-swatch" style="background:#fa5252" data-c="#fa5252"></div><div class="color-swatch" style="background:#51cf66" data-c="#51cf66"></div><div class="color-swatch" style="background:#ff6b6b" data-c="#ff6b6b"></div><div class="color-swatch" style="background:#ffd43b" data-c="#ffd43b"></div><div class="color-swatch" style="background:#748ffc" data-c="#748ffc"></div><div class="color-swatch" style="background:#20c997" data-c="#20c997"></div></div></div>
  <div class="prop-divider"></div>
  <div class="prop-section"><div class="prop-label">Stroke Width</div><div class="prop-row"><input type="range" class="prop-slider" id="sl-stroke" min="1" max="40" value="15" oninput="MB.setStroke(+this.value)"><span class="prop-value" id="vl-stroke">15</span></div></div>
  <div class="prop-section"><div class="prop-label">Line Style</div><div class="prop-row"><button class="line-style-btn active" data-style="solid" onclick="MB.setLineStyle('solid')"><svg viewBox="0 0 32 16"><line x1="2" y1="8" x2="30" y2="8"/></svg></button><button class="line-style-btn" data-style="dashed" onclick="MB.setLineStyle('dashed')"><svg viewBox="0 0 32 16"><line x1="2" y1="8" x2="30" y2="8" stroke-dasharray="6,4"/></svg></button><button class="line-style-btn" data-style="dotted" onclick="MB.setLineStyle('dotted')"><svg viewBox="0 0 32 16"><line x1="2" y1="8" x2="30" y2="8" stroke-dasharray="2,4"/></svg></button></div></div>
  <div class="prop-divider"></div>

// Grid

// Render
function render(){

// Text bake
async function bakeText(o){
  const ff=o.fontFamily||'Fredoka',fs=o.fontSize||22,col=o.color||'#212529',mode=o.texMode||'plain',bs=Math.max(DPR,2);

// Selection
function computeBB(){
  if(!sel.length){selBB=null;return;}
  let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9;
  for(const o of sel){const bb=bbox(o);if(!bb)continue;x0=Math.min(x0,bb.x);y0=Math.min(y0,bb.y);x1=Math.max(x1,bb.x+bb.w);y1=Math.max(y1,bb.y+bb.h);}

function clearSel(){sel=[];selBB=null;selMode='';pointEditMode=false;selRotation=0;const ep=document.getElementById('btn-edit-points');if(ep)ep.classList.remove('active');hideSelTB();rr();}
function moveSel(dx,dy){for(const o of sel){if(o.type==='text'){o.x+=dx;o.y+=dy;}else if(o.points)for(const p of o.points){p.x+=dx;p.y+=dy;}}computeBB();}

// Snapshot for resize/rotate
function snapSelData(){
  resOrigBB={...selBB};
  resOrigData=sel.map(o=>{
    if(o.type==='text')return{type:'text',x:o.x,y:o.y,fontSize:o.fontSize,rotation:o.rotation||0};
    return{type:o.type,points:o.points?o.points.map(p=>({...p})):[],rotation:o.rotation||0};
  });
}

// Apply resize
function applyResize(newBB){
  if(!resOrigBB||resOrigBB.w<1||resOrigBB.h<1)return;
  const ob=resOrigBB;const sx=newBB.w/ob.w,sy=newBB.h/ob.h;
  for(let i=0;i<sel.length;i++){
    const o=sel[i],orig=resOrigData[i];
    if(o.type==='text'){o.x=newBB.x+(orig.x-ob.x)*sx;o.y=newBB.y+(orig.y-ob.y)*sy;const scale=Math.min(Math.abs(sx),Math.abs(sy));o.fontSize=Math.max(8,Math.round(orig.fontSize*scale));delete o._img;delete o._dpr;}

  }
  computeBB();
}

// Rotation

  const cos=Math.cos(delta),sin=Math.sin(delta);
  for(let i=0;i<sel.length;i++){
    const o=sel[i],orig=resOrigData[i];
    if(o.type==='text'){const dx=orig.x-cx,dy=orig.y-cy;o.x=cx+dx*cos-dy*sin;o.y=cy+dx*sin+dy*cos;o.rotation=(orig.rotation||0)+delta;}
    else if(o.points&&orig.points){for(let j=0;j<o.points.length;j++){const dx=orig.points[j].x-cx,dy=orig.points[j].y-cy;o.points[j].x=cx+dx*cos-dy*sin;o.points[j].y=cy+dx*sin+dy*cos;}o.rotation=(orig.rotation||0)+delta;}

  const cos=Math.cos(delta),sin=Math.sin(delta);
  for(const o of sel){
    if(o.type==='text'){const dx=o.x-cx,dy=o.y-cy;o.x=cx+dx*cos-dy*sin;o.y=cy+dx*sin+dy*cos;o.rotation=(o.rotation||0)+delta;}

// Handle detection

// === Sync property panel to selection ===
function syncPropsToSelection(){
  const infoSec=document.getElementById('sel-info-section');
  const infoDivider=document.getElementById('sel-info-divider');
  const infoText=document.getElementById('sel-info-text');

  if(!sel.length){
    infoSec.style.display='none';infoDivider.style.display='none';
    // Show text props based on tool
    document.getElementById('text-props').style.display=currentTool==='text'?'block':'none';
    return;
  }

  // Show editing hint
  infoSec.style.display='block';infoDivider.style.display='block';
  const types=[...new Set(sel.map(o=>o.type))];
  infoText.textContent=sel.length===1?`1 ${sel[0].type} selected`:`${sel.length} objects selected (${types.join(', ')})`;

  // Show text props if any text selected
  const hasText=sel.some(o=>o.type==='text');
  document.getElementById('text-props').style.display=hasText?'block':'none';

  // Sync color
  if(sel.length===1){
    const c=sel[0].color||'#212529';
    document.querySelectorAll('.color-swatch').forEach(e=>e.classList.toggle('selected',e.dataset.c===c));
    color=c; // also set global
  }

  // Sync stroke width
  if(sel.length===1&&sel[0].width){
    const sw=sel[0].width;
    document.getElementById('sl-stroke').value=sw;
    document.getElementById('vl-stroke').textContent=sw;
  }

  // Sync line style
  if(sel.length===1&&sel[0].lineStyle){
    document.querySelectorAll('.line-style-btn').forEach(b=>b.classList.toggle('active',b.dataset.style===sel[0].lineStyle));
  }

  // Sync fill
  if(sel.length===1){
    const o=sel[0];
    let fm='none';
    if(o.fill){if(o.fill.length===9)fm='translucent';else fm='solid';}
    document.querySelectorAll('.grid-btn[data-fill]').forEach(b=>b.classList.toggle('active',b.dataset.fill===fm));
  }

  // Sync opacity
  if(sel.length===1){
    const op=sel[0].opacity!==undefined?sel[0].opacity:1;
    document.getElementById('sl-opacity').value=op;
    document.getElementById('vl-opacity').textContent=Math.round(op*100)+'%';
  }

  // Sync text props
  if(hasText&&sel.length===1&&sel[0].type==='text'){
    const o=sel[0];
    document.getElementById('sl-fsize').value=o.fontSize||22;
    document.getElementById('vl-fsize').textContent=o.fontSize||22;
    document.getElementById('sel-font').value=o.fontFamily||'Fredoka';
    document.getElementById('editor-font-sel').value=o.fontFamily||'Fredoka';
  }
}

// Point editing
function togglePointEdit(){
  if(sel.length!==1){toast('Select a single shape to edit points');return;}
  if(sel[0].type==='text'){toast('Text has no points to edit');return;}
  // For triangles with only 2 points, expand to 3 explicit points
  if(sel[0].type==='triangle'&&sel[0].points&&sel[0].points.length===2){
    const[a,b]=sel[0].points;
    sel[0].points=[{x:(a.x+b.x)/2,y:Math.min(a.y,b.y)},{x:Math.max(a.x,b.x),y:Math.max(a.y,b.y)},{x:Math.min(a.x,b.x),y:Math.max(a.y,b.y)}];
  }
  pointEditMode=!pointEditMode;
  const btn=document.getElementById('btn-edit-points');
  if(btn)btn.classList.toggle('active',pointEditMode);
  if(pointEditMode)toast('Drag points to edit. Dbl-click segment to add. Alt+click point to delete.');
  rr();
}

// === FIXED FLIPPING with animation ===
function flipH(){
  if(!sel.length||!selBB)return;
  saveHist();
  // Compute center of selection
  const cx=selBB.x+selBB.w/2;
  // Store original points for animation
  const origData=sel.map(o=>{
    if(o.type==='text'){
      const d=o._dpr||DPR,iw=o._img?o._img.width/d:200;
      return{type:'text',x:o.x,y:o.y,targetX:2*cx-o.x-iw,targetY:o.y};
    }
    const origPts=o.points?o.points.map(p=>({...p})):[];
    const targetPts=origPts.map(p=>({x:2*cx-p.x,y:p.y}));
    return{type:o.type,origPts,targetPts};
  });
  flipAnim={startTime:performance.now(),duration:300,axis:'h',cx,objects:sel.slice(),data:origData};
  rr();
  toast('Flipped horizontal');
}

function flipV(){
  if(!sel.length||!selBB)return;
  saveHist();
  const cy=selBB.y+selBB.h/2;
  const origData=sel.map(o=>{
    if(o.type==='text'){
      const d=o._dpr||DPR,ih=o._img?o._img.height/d:40;
      return{type:'text',x:o.x,y:o.y,targetX:o.x,targetY:2*cy-o.y-ih};
    }
    const origPts=o.points?o.points.map(p=>({...p})):[];
    const targetPts=origPts.map(p=>({x:p.x,y:2*cy-p.y}));
    return{type:o.type,origPts,targetPts};
  });
  flipAnim={startTime:performance.now(),duration:300,axis:'v',objects:sel.slice(),data:origData};
  rr();
  toast('Flipped vertical');
}

function applyFlipFrame(anim,t){
  for(let i=0;i<anim.objects.length;i++){
    const o=anim.objects[i],d=anim.data[i];
    if(d.type==='text'){
      o.x=d.x+(d.targetX-d.x)*t;
      o.y=d.y+(d.targetY-d.y)*t;
    } else if(o.points&&d.origPts){
      for(let j=0;j<o.points.length;j++){
        if(j<d.origPts.length&&j<d.targetPts.length){
          o.points[j].x=d.origPts[j].x+(d.targetPts[j].x-d.origPts[j].x)*t;
          o.points[j].y=d.origPts[j].y+(d.targetPts[j].y-d.origPts[j].y)*t;
        }
      }
    }
  }
  computeBB();
}

// Pointer
function ptrDown(e){
  e.preventDefault();canvas.setPointerCapture(e.pointerId);
  const sx=e.clientX,sy=e.clientY;lastPt={x:sx,y:sy};
  if(spaceDown||e.button===1||currentTool==='pan'){isPanning=true;panStart={x:sx,y:sy};panOrig={x:panX,y:panY};document.body.classList.add('cur-panning');return;}
  const w=s2w(sx,sy);

  if(currentTool==='select'){
    // Point editing mode
    if(pointEditMode&&sel.length===1){
      const o=sel[0];
      if(e.altKey&&o.points&&o.points.length>2){
        for(let i=0;i<o.points.length;i++){
          const ps=w2s(o.points[i].x,o.points[i].y);
          if(Math.hypot(sx-ps.x,sy-ps.y)<12){saveHist();o.points.splice(i,1);computeBB();rr();toast('Point deleted');return;}
        }
      }
      if(o.points){
        for(let i=0;i<o.points.length;i++){
          const ps=w2s(o.points[i].x,o.points[i].y);
          if(Math.hypot(sx-ps.x,sy-ps.y)<12){saveHist();editingPoint={obj:o,idx:i};document.body.className='cur-point';return;}
        }
      }
    }
    // Check resize/rotate handles
    if(sel.length&&selBB&&!pointEditMode){
      const h=getHandle(sx,sy);
      if(h==='rotate'){saveHist();selMode='rotate';snapSelData();rotOrigSelRotation=selRotation;const cx=selBB.x+selBB.w/2,cy=selBB.y+selBB.h/2;rotStartAngle=Math.atan2(w.y-cy,w.x-cx);document.body.className='cur-rotate';return;}
      if(h){saveHist();selMode=h;snapSelData();selDragW={x:w.x,y:w.y};setCursorForHandle(h);return;}
      const pad=5/zoom;
      if(w.x>=selBB.x-pad&&w.x<=selBB.x+selBB.w+pad&&w.y>=selBB.y-pad&&w.y<=selBB.y+selBB.h+pad){
        saveHist();selMode='move';selDragW={x:w.x,y:w.y};document.body.className='cur-moving';return;
      }
    }
    const hit=hitWorld(w.x,w.y);
    if(hit){

    case'eraser':saveHist();isDrawing=true;eraseAt(w.x,w.y);break;
    case'line':case'rect':case'ellipse':case'arrow':case'triangle':saveHist();isDrawing=true;liveP0=sp;liveP1=sp;break;
    case'text':openTextEditor(sx,sy,sp);break;

}

function ptrMove(e){
  e.preventDefault();const sx=e.clientX,sy=e.clientY;lastPt={x:sx,y:sy};
  const wc=s2w(sx,sy);
  document.getElementById('coord-display').textContent=`x: ${Math.round(wc.x)}, y: ${Math.round(wc.y)}`;
  if(currentTool==='eraser'){const ec=document.getElementById('eraser-cursor');ec.style.display='block';ec.style.width=ec.style.height=eraserR+'px';ec.style.left=sx+'px';ec.style.top=sy+'px';}
  if(isPanning){panX=panOrig.x+(sx-panStart.x);panY=panOrig.y+(sy-panStart.y);rr();return;}

  if(currentTool==='select'){
    const w=s2w(sx,sy);
    if(editingPoint){const sp=snapPoint(w);editingPoint.obj.points[editingPoint.idx].x=sp.x;editingPoint.obj.points[editingPoint.idx].y=sp.y;computeBB();rr();return;}
    if(selMode==='move'&&selDragW){
      let dx=w.x-selDragW.x,dy=w.y-selDragW.y;
      if(snapToGrid){dx=Math.round(dx/GRID_SIZE)*GRID_SIZE;dy=Math.round(dy/GRID_SIZE)*GRID_SIZE;}
      if(dx||dy){moveSel(dx,dy);selDragW.x+=dx;selDragW.y+=dy;}
      rr();return;
    }
    if(selMode==='rotate'&&selDragW){
      const cx=resOrigBB.x+resOrigBB.w/2,cy=resOrigBB.y+resOrigBB.h/2;
      const curAngle=Math.atan2(w.y-cy,w.x-cx);
      let delta=curAngle-rotStartAngle;
      if(e.shiftKey){const deg=delta*180/Math.PI;delta=Math.round(deg/15)*15*Math.PI/180;}
      applyRotationFromOrig(delta);
      selRotation=rotOrigSelRotation+delta;
      const input=document.getElementById('rot-input');if(input)input.value=Math.round(selRotation*180/Math.PI);
      rr();return;
    }
    if(selMode&&selMode!=='move'&&selMode!=='rotate'&&selDragW&&resOrigBB){
      const dx=w.x-selDragW.x,dy=w.y-selDragW.y;
      const ob=resOrigBB;
      let nx=ob.x,ny=ob.y,nw=ob.w,nh=ob.h;
      const h=selMode;
      if(h.includes('w')){nx=ob.x+dx;nw=ob.w-dx;}
      if(h.includes('e')){nw=ob.w+dx;}
      if(h.includes('n')){ny=ob.y+dy;nh=ob.h-dy;}
      if(h.includes('s')){nh=ob.h+dy;}
      if(nw<10){if(h.includes('w'))nx=ob.x+ob.w-10;nw=10;}
      if(nh<10){if(h.includes('n'))ny=ob.y+ob.h-10;nh=10;}
      applyResize({x:nx,y:ny,w:nw,h:nh});
      rr();return;
    }
    if(selMarquee){
      const box=document.getElementById('selection-box');
      box.style.left=Math.min(sx,mqSX)+'px';box.style.top=Math.min(sy,mqSY)+'px';
      box.style.width=Math.abs(sx-mqSX)+'px';box.style.height=Math.abs(sy-mqSY)+'px';return;
    }
    if(sel.length&&selBB&&!pointEditMode){
      const h=getHandle(sx,sy);
      if(h){setCursorForHandle(h);return;}
      const pad=5/zoom;
      if(w.x>=selBB.x-pad&&w.x<=selBB.x+selBB.w+pad&&w.y>=selBB.y-pad&&w.y<=selBB.y+selBB.h+pad){document.body.className='cur-moving';return;}
    }
    if(pointEditMode&&sel.length===1&&sel[0].points){
      const o=sel[0];
      for(const p of o.points){const ps=w2s(p.x,p.y);if(Math.hypot(sx-ps.x,sy-ps.y)<12){document.body.className='cur-point';return;}}
    }
    document.body.className='cur-select';
    return;
  }

  if(!isDrawing)return;
  const w=s2w(sx,sy);
  const sp=snapPoint(w);
  switch(currentTool){
    case'pen':case'marker':if(liveStroke){const last=liveStroke.points[liveStroke.points.length-1];if(Math.hypot(sp.x-last.x,sp.y-last.y)>2/zoom)liveStroke.points.push({x:sp.x,y:sp.y});}break;
    case'eraser':eraseAt(w.x,w.y);break;
    case'line':case'rect':case'ellipse':case'arrow':case'triangle':liveP1=sp;break;
  }
  rr();
}

function ptrUp(e){
  document.body.classList.remove('cur-panning');
  const ec=document.getElementById('eraser-cursor');if(ec)ec.style.display='none';
  if(isPanning){isPanning=false;return;}

  if(currentTool==='select'){
    if(editingPoint){editingPoint=null;document.body.className='cur-select';rr();return;}
    if(selMode){selMode='';selDragW=null;resOrigBB=null;resOrigData=null;document.body.className='cur-select';rr();return;}
    if(selMarquee){
      selMarquee=false;
      const box=document.getElementById('selection-box');box.style.display='none';
      const bx=parseInt(box.style.left),by=parseInt(box.style.top);
      const bw=parseInt(box.style.width),bh=parseInt(box.style.height);
      if(bw<5&&bh<5){const w=s2w(bx+bw/2,by+bh/2);const hit=hitWorld(w.x,w.y);if(hit)sel=[hit];}
      else{const wa=s2w(bx,by),wb=s2w(bx+bw,by+bh);const[x0,y0,x1,y1]=[Math.min(wa.x,wb.x),Math.min(wa.y,wb.y),Math.max(wa.x,wb.x),Math.max(wa.y,wb.y)];for(const o of objects){const bb=bbox(o);if(bb&&bb.x<x1&&bb.x+bb.w>x0&&bb.y<y1&&bb.y+bb.h>y0)sel.push(o);}}
      computeBB();updateRotationInput();if(sel.length)toast(`Selected ${sel.length}`);rr();return;
    }
    return;
  }

  if(!isDrawing)return;isDrawing=false;
  const sx=e.clientX??lastPt?.x??0,sy=e.clientY??lastPt?.y??0;const w=s2w(sx,sy);
  const sp=snapPoint(w);
  switch(currentTool){
    case'pen':case'marker':if(liveStroke&&liveStroke.points.length)objects.push(liveStroke);liveStroke=null;break;
    case'line':case'rect':case'ellipse':case'arrow':case'triangle':if(liveP0&&Math.hypot(sp.x-liveP0.x,sp.y-liveP0.y)>3/zoom){const fill=getFill();objects.push({type:currentTool,points:[liveP0,sp],color,width:strokeW,lineStyle,opacity:currentOpacity<1?currentOpacity:undefined,fill});}liveP0=liveP1=null;break;
  }
  rr();
}

function onDblClick(e){
  if(currentTool!=='select'&&currentTool!=='text')return;
  const w=s2w(e.clientX,e.clientY);
  if(pointEditMode&&sel.length===1&&(sel[0].type==='pen'||sel[0].type==='marker')){
    const o=sel[0];
    if(o.points&&o.points.length>=2){
      let bestIdx=-1,bestDist=Infinity;
      for(let i=0;i<o.points.length-1;i++){const d=dPS(w.x,w.y,o.points[i].x,o.points[i].y,o.points[i+1].x,o.points[i+1].y);if(d<bestDist){bestDist=d;bestIdx=i;}}
      if(bestIdx>=0&&bestDist<15/zoom){saveHist();const mid={x:(o.points[bestIdx].x+o.points[bestIdx+1].x)/2,y:(o.points[bestIdx].y+o.points[bestIdx+1].y)/2};o.points.splice(bestIdx+1,0,mid);rr();toast('Point added');return;}
    }
  }
  // Allow double-click on segment for triangle/rect/line to add point in point edit mode
  if(pointEditMode&&sel.length===1){
    const o=sel[0];
    if(o.points&&o.points.length>=2&&(o.type==='triangle'||o.type==='rect'||o.type==='line')){
      let bestIdx=-1,bestDist=Infinity;
      for(let i=0;i<o.points.length-1;i++){const d=dPS(w.x,w.y,o.points[i].x,o.points[i].y,o.points[i+1].x,o.points[i+1].y);if(d<bestDist){bestDist=d;bestIdx=i;}}
      // Also check closing segment for closed shapes
      if(o.type==='triangle'||o.type==='rect'){
        const last=o.points.length-1;
        const d=dPS(w.x,w.y,o.points[last].x,o.points[last].y,o.points[0].x,o.points[0].y);
        if(d<bestDist){bestDist=d;bestIdx=last;}
      }
      if(bestIdx>=0&&bestDist<15/zoom){
        saveHist();
        const nextIdx=(bestIdx+1)%o.points.length;
        const mid={x:(o.points[bestIdx].x+o.points[nextIdx].x)/2,y:(o.points[bestIdx].y+o.points[nextIdx].y)/2};
        o.points.splice(bestIdx+1,0,mid);
        rr();toast('Point added');return;
      }
    }
  }
  for(let i=objects.length-1;i>=0;i--){const o=objects[i];if(o.type!=='text')continue;if(hitText(o,w.x,w.y)){editingObj=o;openTextEditor(e.clientX,e.clientY,{x:o.x,y:o.y},o);return;}}
}
function onWheel(e){e.preventDefault();if(e.ctrlKey||e.metaKey){const f=e.deltaY<0?1.1:.91;const nz=Math.min(ZOOM_MAX,Math.max(ZOOM_MIN,zoom*f));panX=e.clientX-(e.clientX-panX)*(nz/zoom);panY=e.clientY-(e.clientY-panY)*(nz/zoom);zoom=nz;updateZoom();}else{panX-=e.deltaX;panY-=e.deltaY;}rr();}

// Eraser
function eraseAt(wx,wy){const r=(eraserR/2)/zoom;let ch=false;const keep=[];for(const o of objects){if(hitErase(o,wx,wy,r))ch=true;else keep.push(o);}if(ch){objects=keep;sel=sel.filter(o=>objects.includes(o));computeBB();rr();}}
function hitErase(o,wx,wy,r){if(o.type==='text'){const bb=bbox(o);return bb&&wx>=bb.x-r&&wx<=bb.x+bb.w+r&&wy>=bb.y-r&&wy<=bb.y+bb.h+r;}const hr=r+(o.width||2)/2;const segs=edgeSegs(o);for(const[p1,p2]of segs)if(dPS(wx,wy,p1.x,p1.y,p2.x,p2.y)<hr)return true;if(o.fill&&pointInShape(o,wx,wy))return true;if(!segs.length&&o.points)for(const p of o.points)if(Math.hypot(p.x-wx,p.y-wy)<hr)return true;return false;}

// Actions
function deleteSelected(){if(!sel.length)return;saveHist();objects=objects.filter(o=>!sel.includes(o));clearSel();toast('Deleted');}
function duplicateSel(){if(!sel.length)return;saveHist();const off=20/zoom;const nw=[];for(const o of sel){const c=JSON.parse(JSON.stringify(o));delete c._img;delete c._dpr;if(c.points)c.points=c.points.map(p=>({x:p.x+off,y:p.y+off}));if(c.type==='text'){c.x+=off;c.y+=off;}objects.push(c);nw.push(c);}sel=nw;computeBB();updateRotationInput();rr();toast('Duplicated');}
function bringForward(){if(!sel.length)return;saveHist();for(const o of sel){const i=objects.indexOf(o);if(i>=0&&i<objects.length-1){objects.splice(i,1);objects.splice(i+1,0,o);}}rr();}
function sendBackward(){if(!sel.length)return;saveHist();for(let si=sel.length-1;si>=0;si--){const o=sel[si];const i=objects.indexOf(o);if(i>0){objects.splice(i,1);objects.splice(i-1,0,o);}}rr();}
function align(type){if(sel.length<2){toast('Select multiple objects to align');return;}saveHist();for(const o of sel){const bb=bbox(o);if(!bb)continue;let dx=0,dy=0;switch(type){case'left':dx=selBB.x-bb.x;break;case'right':dx=(selBB.x+selBB.w)-(bb.x+bb.w);break;case'hcenter':dx=(selBB.x+selBB.w/2)-(bb.x+bb.w/2);break;case'top':dy=selBB.y-bb.y;break;case'bottom':dy=(selBB.y+selBB.h)-(bb.y+bb.h);break;case'vcenter':dy=(selBB.y+selBB.h/2)-(bb.y+bb.h/2);break;}moveObj(o,dx,dy);}computeBB();rr();toast('Aligned');}
function copySel(){if(!sel.length)return;clipboard=sel.map(o=>{const c=JSON.parse(JSON.stringify(o));delete c._img;delete c._dpr;return c;});toast('Copied '+sel.length+' item'+(sel.length>1?'s':''));}
function paste(){if(!clipboard.length)return;saveHist();const off=20/zoom;const nw=[];for(const o of clipboard){const c=JSON.parse(JSON.stringify(o));if(c.points)c.points=c.points.map(p=>({x:p.x+off,y:p.y+off}));if(c.type==='text'){c.x+=off;c.y+=off;}objects.push(c);nw.push(c);}sel=nw;computeBB();updateRotationInput();rr();toast('Pasted');}
function exportPNG(){if(!objects.length){toast('Nothing to export');return;}const ts=sel,tp=pointEditMode;sel=[];pointEditMode=false;rr();setTimeout(()=>{const link=document.createElement('a');link.download='mathboard-'+Date.now()+'.png';link.href=canvas.toDataURL('image/png');link.click();sel=ts;pointEditMode=tp;rr();toast('Exported as PNG');},50);}
function fitToView(){if(!objects.length){resetView();return;}let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9;for(const o of objects){const bb=bbox(o);if(!bb)continue;x0=Math.min(x0,bb.x);y0=Math.min(y0,bb.y);x1=Math.max(x1,bb.x+bb.w);y1=Math.max(y1,bb.y+bb.h);}const pad=50;const w=x1-x0,h=y1-y0;if(w<1||h<1){resetView();return;}const zx=(W-pad*2)/w,zy=(H-pad*2)/h;zoom=Math.min(ZOOM_MAX,Math.max(ZOOM_MIN,Math.min(zx,zy)));panX=-x0*zoom+(W-w*zoom)/2;panY=-y0*zoom+(H-h*zoom)/2;updateZoom();rr();}

// Keyboard
function onKeyDown(e){
  const tag=e.target.tagName,inp=tag==='TEXTAREA'||tag==='INPUT'||tag==='SELECT',ctrl=e.ctrlKey||e.metaKey;
  if(ctrl&&e.key==='z'&&!e.shiftKey){e.preventDefault();undo();return;}
  if(ctrl&&(e.key==='y'||(e.shiftKey&&e.key==='z'))){e.preventDefault();redo();return;}
  if(ctrl&&e.key==='a'&&currentTool==='select'){e.preventDefault();sel=[...objects];computeBB();updateRotationInput();rr();return;}
  if(ctrl&&e.key==='d'&&sel.length){e.preventDefault();duplicateSel();return;}
  if(ctrl&&e.key==='c'&&sel.length){e.preventDefault();copySel();return;}
  if(ctrl&&e.key==='v'&&clipboard.length){e.preventDefault();paste();return;}
  if(inp)return;
  switch(e.key.toLowerCase()){
    case'p':tool('pen');break;case'm':tool('marker');break;case'e':tool('eraser');break;
    case't':tool('text');break;case's':tool('select');break;case'l':tool('line');break;
    case'r':tool('rect');break;case'o':tool('ellipse');break;case'g':tool('triangle');break;
    case'a':if(!ctrl)tool('arrow');break;
    case' ':if(!spaceDown){spaceDown=true;document.body.classList.add('cur-pan');}e.preventDefault();break;
    case'delete':case'backspace':if(sel.length)deleteSelected();break;
    case'escape':if(pointEditMode){pointEditMode=false;const ep=document.getElementById('btn-edit-points');if(ep)ep.classList.remove('active');rr();}else{clearSel();cancelText();}break;
    case'arrowup':if(sel.length){saveHist();moveSel(0,-(e.shiftKey?10:1));rr();e.preventDefault();}break;
    case'arrowdown':if(sel.length){saveHist();moveSel(0,e.shiftKey?10:1);rr();e.preventDefault();}break;
    case'arrowleft':if(sel.length){saveHist();moveSel(-(e.shiftKey?10:1),0);rr();e.preventDefault();}break;
    case'arrowright':if(sel.length){saveHist();moveSel(e.shiftKey?10:1,0);rr();e.preventDefault();}break;
  }
}
function onKeyUp(e){if(e.key===' '){spaceDown=false;if(currentTool!=='pan')document.body.classList.remove('cur-pan');}}

// History
function saveHist(){hist.push(cloneO(objects));if(hist.length>MAX_HISTORY)hist.shift();redoSt=[];}
function cloneO(a){return a.map(o=>{const c=JSON.parse(JSON.stringify(o));delete c._img;delete c._dpr;return c;});}
function undo(){if(!hist.length){toast('Nothing to undo');return;}redoSt.push(cloneO(objects));objects=hist.pop();clearSel();rr();toast('Undo');}
function redo(){if(!redoSt.length){toast('Nothing to redo');return;}hist.push(cloneO(objects));objects=redoSt.pop();clearSel();rr();toast('Redo');}

// Tool
function tool(name){document.body.className=`cur-${name}`;currentTool=name;document.querySelectorAll('.tool-btn[id^="btn-"]').forEach(b=>b.classList.remove('active'));const btn=document.getElementById(`btn-${name}`);if(btn)btn.classList.add('active');document.getElementById('text-props').style.display=name==='text'?'block':'none';if(name!=='select')clearSel();if(name!=='text')cancelText();rr();}

function texMode(m){texMode_=m;document.querySelectorAll('.mode-tab').forEach(t=>t.classList.remove('active'));const tab=document.getElementById('tab-'+m);if(tab)tab.classList.add('active');document.getElementById('tex-input').placeholder=m==='latex'?'\\frac{-b \\pm \\sqrt{b^2-4ac}}{2a}':m==='mixed'?'The area is $\\pi r^2$ square units':'Type here...';updatePreview();}
function updatePreview(){const t=document.getElementById('tex-input').value,pv=document.getElementById('tex-preview');if(!t.trim()){pv.innerHTML='<span style="color:var(--text-muted);font-size:13px">Preview appears here...</span>';return;}pv.style.fontFamily=`'${fontFamily}',sans-serif`;pv.style.fontSize=fontSize+'px';pv.style.color=color;if(!window.katex||texMode_==='plain'){pv.textContent=t;return;}try{if(texMode_==='latex')pv.innerHTML=katex.renderToString(t,{throwOnError:false,displayMode:false});else pv.innerHTML=parseMixed(t);}catch(e){pv.textContent=t;}}
