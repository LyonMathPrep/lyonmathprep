<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin: Auto-Assign Levels</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8f9fa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: #fff;
      border: 2px solid #000;
      border-radius: 16px;
      padding: 40px;
      max-width: 500px;
      text-align: center;
      box-shadow: 6px 6px 0 #000;
    }
    h1 { margin-top: 0; font-size: 24px; }
    p { color: #555; margin-bottom: 24px; }
    button {
      background: #e63946;
      color: #fff;
      border: 2px solid #000;
      border-radius: 10px;
      padding: 14px 24px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover:not(:disabled) { background: #c1121f; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    #status {
      margin-top: 20px;
      font-weight: 700;
      display: none;
      padding: 12px;
      border-radius: 8px;
    }
    #status.success { display: block; background: #e6f4ea; color: #2d7a3a; border: 2px solid #2d7a3a; }
    #status.error { display: block; background: #fde8ea; color: #c1121f; border: 2px solid #c1121f; }
  </style>
</head>
<body>

<div class="card">
  <h1>Auto-Assign Next Levels</h1>
  <p>Clicking this button will check every user's finished levels. If they have finished a level (1-9) and are missing the next one, it will be assigned to them automatically. Users who finish Level 10 will be left alone to take the Unit Test.</p>
  
  <button id="runBtn" onclick="runAutoAssign()">Run Auto-Assign</button>
  
  <div id="status"></div>
</div>

<script>
  // PASTE YOUR NEW DEPLOYMENT URL HERE
  const ADMIN_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxu3P-XTzGjBhopCXQJiDD6MPlRMLJ34uJCzMgWyof5KdDpp9mGzh2Eb5_KeFTTPC7P/exec';

  async function runAutoAssign() {
    const btn = document.getElementById('runBtn');
    const status = document.getElementById('status');
    
    btn.disabled = true;
    btn.textContent = 'Processing...';
    status.className = '';
    status.style.display = 'none';

    try {
      const response = await fetch(ADMIN_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'autoAssignNextLevels' })
      });

      const data = await response.json();

      if (data.success) {
        status.textContent = '✅ ' + data.message;
        status.className = 'success';
      } else {
        status.textContent = '❌ Error: ' + (data.error || 'Something went wrong.');
        status.className = 'error';
      }
    } catch (e) {
      status.textContent = '❌ Network Error: ' + e.message;
      status.className = 'error';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Run Auto-Assign';
    }
  }
</script>

</body>
</html>
